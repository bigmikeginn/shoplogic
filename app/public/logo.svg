<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .logo-icon { fill: none; stroke: currentColor; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
      .logo-fill { fill: currentColor; }
    </style>
  </defs>

  <!-- Gear icon (left) -->
  <g transform="translate(20, 50)">
    <circle cx="0" cy="0" r="8" class="logo-icon"/>
    <rect x="-1.5" y="-12" width="3" height="24" rx="1" class="logo-icon"/>
    <rect x="-12" y="-1.5" width="24" height="3" rx="1" class="logo-icon"/>
    <circle cx="0" cy="0" r="3" class="logo-fill"/>
  </g>

  <!-- Wrench icon (center) -->
  <g transform="translate(50, 50)">
    <path d="M -6 6 Q 0 0, 8 -6" class="logo-icon"/>
    <circle cx="8" cy="-6" r="3" class="logo-icon"/>
    <circle cx="-6" cy="6" r="3" class="logo-icon"/>
  </g>

  <!-- Ruler/Square icon (right) -->
  <g transform="translate(80, 50)">
    <rect x="-6" y="-8" width="12" height="16" rx="1" class="logo-icon"/>
    <line x1="-6" y1="-4" x2="6" y2="-4" class="logo-icon"/>
    <line x1="-6" y1="0" x2="6" y2="0" class="logo-icon"/>
    <line x1="-6" y1="4" x2="6" y2="4" class="logo-icon"/>
  </g>

  <!-- Accent circle background -->
  <circle cx="50" cy="50" r="48" fill="none" stroke="currentColor" stroke-width="1" opacity="0.15"/>
</svg>